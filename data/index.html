<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDG Tuner Control</title>
    <style>
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #111122;
            --bg-card: #16213e;
            --bg-input: #1a1a2e;
            --border: #0f3460;
            --text-primary: #eee;
            --text-secondary: #888;
            --text-muted: #555;
            --accent-green: #00ff00;
            --accent-red: #ff0000;
            --accent-yellow: #ffcc00;
            --accent-blue: #2255aa;
            --accent-orange: #cc8800;
            --btn-red: #cc3333;
            --btn-red-hover: #ff4444;
            --btn-blue: #2255aa;
            --btn-blue-hover: #3366cc;
            --btn-orange: #cc8800;
            --btn-orange-hover: #ffaa00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.1rem;
            color: var(--accent-green);
            font-weight: 600;
        }

        .header-status {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            margin-right: 4px;
        }

        .status-dot.offline { background: var(--accent-red); }
        .status-dot.connecting { background: var(--accent-yellow); animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Navigation */
        .nav {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .nav-tab {
            flex: 1;
            padding: 0.6rem;
            text-align: center;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-tab:hover { color: var(--text-primary); }
        .nav-tab.active {
            color: var(--accent-green);
            border-bottom: 2px solid var(--accent-green);
            background: var(--bg-card);
        }

        /* Main layout */
        .main {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            max-width: 900px;
            margin: 0 auto;
            align-items: flex-start;
        }

        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; }

        /* Meter panel (left 2/3) */
        .meter-panel {
            flex: 2;
            min-width: 0;
        }

        .meter-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem;
            position: relative;
        }

        #meterCanvas {
            width: 100%;
            aspect-ratio: 1 / 1;
            display: block;
            cursor: pointer;
        }

        .meter-info {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0.75rem 0.75rem;
            font-size: 0.9rem;
        }

        .meter-info .band {
            color: var(--accent-green);
            font-weight: 600;
        }

        .meter-info .scale {
            color: var(--text-secondary);
            cursor: pointer;
        }

        .meter-info .scale:hover { color: var(--text-primary); }

        /* Control panel (right 1/3) */
        .control-panel {
            flex: 1;
            min-width: 150px;
        }

        .status-bar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.6rem 0.75rem;
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
        }

        .status-row:last-child { margin-bottom: 0; }

        .status-row span:first-child { color: var(--text-secondary); }
        .status-row span:last-child { color: var(--text-primary); font-weight: 500; }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .btn {
            padding: 0.7rem 0.5rem;
            border: none;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .btn:active { transform: scale(0.97); }

        .btn-red { background: var(--btn-red); color: #fff; }
        .btn-red:hover { background: var(--btn-red-hover); }
        .btn-blue { background: var(--btn-blue); color: #fff; }
        .btn-blue:hover { background: var(--btn-blue-hover); }
        .btn-orange { background: var(--btn-orange); color: #fff; }
        .btn-orange:hover { background: var(--btn-orange-hover); }

        /* Settings form */
        .settings-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .settings-section h3 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border);
        }

        .form-group { margin-bottom: 0.75rem; }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.45rem 0.6rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .btn-save {
            width: 100%;
            padding: 0.65rem;
            background: var(--accent-green);
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.4rem;
        }

        .btn-save:hover { opacity: 0.9; }

        .btn-reset {
            width: 100%;
            padding: 0.65rem;
            background: transparent;
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 0.4rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 100;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { border-color: var(--accent-green); }
        .toast.error { border-color: var(--accent-red); }

        /* Responsive */
        @media (max-width: 600px) {
            .main { flex-direction: column; }
            .meter-panel { order: 1; }
            .control-panel { order: 2; min-width: 0; }
            .button-stack {
                display: grid;
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>LDG Tuner Control</h1>
        <div class="header-status">
            <span id="connectionStatus">
                <span class="status-dot connecting"></span>
                Connecting...
            </span>
        </div>
    </div>

    <nav class="nav">
        <button class="nav-tab active" data-tab="control">Control</button>
        <button class="nav-tab" data-tab="settings">Settings</button>
    </nav>

    <main class="main">
        <!-- Control Tab -->
        <div id="tab-control" class="tab-content active">
            <div class="meter-panel">
                <div class="meter-container">
                    <canvas id="meterCanvas" width="600" height="600"></canvas>
                    <div class="meter-info">
                        <span class="band" id="bandValue">Band: --</span>
                        <span class="scale" id="scaleValue" title="Tap meter to toggle">1000W</span>
                    </div>
                </div>
            </div>
            <div class="control-panel">
                <div class="status-bar">
                    <div class="status-row">
                        <span>Mode</span>
                        <span id="modeValue">--</span>
                    </div>
                    <div class="status-row">
                        <span>Antenna</span>
                        <span id="antValue">--</span>
                    </div>
                </div>
                <div class="button-stack">
                    <button class="btn btn-red" onclick="sendCommand('memory_tune')">Mem Tune</button>
                    <button class="btn btn-red" onclick="sendCommand('full_tune')">Full Tune</button>
                    <button class="btn btn-blue" onclick="sendCommand('toggle')">Toggle Ant</button>
                    <button class="btn btn-orange" onclick="sendCommand('bypass')">Bypass</button>
                    <button class="btn btn-blue" onclick="sendCommand('auto')">Auto Mode</button>
                </div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="tab-settings" class="tab-content">
            <div class="settings-section">
                <h3>Network</h3>
                <div class="form-group">
                    <label>WiFi SSID</label>
                    <input type="text" id="ssid" placeholder="your_network">
                </div>
                <div class="form-group">
                    <label>WiFi Password</label>
                    <input type="password" id="wifiPass" placeholder="your_password">
                </div>
            </div>

            <div class="settings-section">
                <h3>MQTT</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Broker</label>
                        <input type="text" id="mqttBroker" placeholder="192.168.1.100">
                    </div>
                    <div class="form-group">
                        <label>Port</label>
                        <input type="number" id="mqttPort" value="1883">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="mqttUser" placeholder="ldgcontroller">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="mqttPass" placeholder="change_me">
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <h3>Web Authentication</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="webUser" placeholder="admin">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="webPass" placeholder="change_me_please">
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <h3>Tuner</h3>
                <div class="form-group">
                    <label>Meter PSU Voltage (tuner's 12V supply)</label>
                    <input type="number" id="psuVoltage" step="0.1" value="13.8" placeholder="13.8">
                </div>
            </div>

            <button class="btn-save" onclick="saveSettings()">Save & Restart</button>
            <button class="btn-reset" onclick="resetSettings()">Reset to Defaults</button>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        // Tab navigation
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        // Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============================================================
        // Cross-needle meter (Canvas)
        // ============================================================
        const canvas = document.getElementById('meterCanvas');
        const ctx = canvas.getContext('2d');

        let meterState = {
            fwdPower: 0,
            refPower: 0,
            swr: 1.0,
            maxPower: 1000,
            highScale: true
        };

        function drawMeter() {
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h - 40;
            const radius = w / 2 - 50;

            ctx.clearRect(0, 0, w, h);

            // Background
            ctx.fillStyle = '#111122';
            ctx.fillRect(0, 0, w, h);

            // Scale arc
            ctx.strokeStyle = '#444444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy - 10, radius, Math.PI, 2 * Math.PI);
            ctx.stroke();

            // Tick marks and labels
            const numTicks = 11;
            for (let i = 0; i <= numTicks; i++) {
                const angle = Math.PI * (1 - i / numTicks);
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);

                const tickLen = (i % 5 === 0) ? 14 : 7;
                const x1 = cx + cos * (radius + 5);
                const y1 = (cy - 10) - sin * (radius + 5);
                const x2 = cx + cos * (radius + 5 + tickLen);
                const y2 = (cy - 10) - sin * (radius + 5 + tickLen);

                ctx.strokeStyle = (i % 5 === 0) ? '#ffffff' : '#888888';
                ctx.lineWidth = (i % 5 === 0) ? 2 : 1;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();

                // Labels
                if (i % 5 === 0) {
                    const val = Math.round((i / numTicks) * meterState.maxPower);
                    const lx = cx + cos * (radius - 25);
                    const ly = (cy - 10) - sin * (radius - 25);
                    ctx.fillStyle = '#cccccc';
                    ctx.font = 'bold 28px -apple-system, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(val.toString(), lx, ly);
                }
            }

            // Pivot dots
            const fwdPx = cx - radius + 20;
            const fwdPy = cy;
            const refPx = cx + radius - 20;
            const refPy = cy;

            // Forward pivot (green)
            ctx.fillStyle = '#00aa00';
            ctx.beginPath();
            ctx.arc(fwdPx, fwdPy, 8, 0, 2 * Math.PI);
            ctx.fill();

            // Reflected pivot (red)
            ctx.fillStyle = '#aa0000';
            ctx.beginPath();
            ctx.arc(refPx, refPy, 8, 0, 2 * Math.PI);
            ctx.fill();

            // Needle angles
            const fwdAngle = Math.PI * (1 - Math.min(meterState.fwdPower / meterState.maxPower, 1));
            const refAngle = Math.PI * (1 - Math.min(meterState.refPower / meterState.maxPower, 1));

            // Forward needle (green)
            const fwdLen = radius * 2 - 40;
            const fwdNx = fwdPx + Math.cos(fwdAngle) * fwdLen;
            const fwdNy = fwdPy - Math.sin(fwdAngle) * fwdLen;

            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(fwdPx, fwdPy);
            ctx.lineTo(fwdNx, fwdNy);
            ctx.stroke();

            // Reflected needle (red)
            const refLen = radius * 2 - 40;
            const refNx = refPx - Math.cos(refAngle) * refLen;
            const refNy = refPy - Math.sin(refAngle) * refLen;

            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(refPx, refPy);
            ctx.lineTo(refNx, refNy);
            ctx.stroke();

            // SWR text
            const swrColor = meterState.swr > 2.0 ? '#ff4444' :
                             meterState.swr > 1.5 ? '#ffaa00' : '#00ff00';
            ctx.fillStyle = swrColor;
            ctx.font = 'bold 48px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(meterState.swr.toFixed(1) + ':1', cx, cy - radius / 2 - 10);
        }

        // Tap to toggle scale
        canvas.addEventListener('click', () => {
            meterState.highScale = !meterState.highScale;
            meterState.maxPower = meterState.highScale ? 1000 : 100;
            document.getElementById('scaleValue').textContent = meterState.highScale ? '1000W' : '100W';
            drawMeter();
        });

        function updateMeter(data) {
            meterState.fwdPower = data.fwd_power || 0;
            meterState.refPower = data.ref_power || 0;
            meterState.swr = data.swr || 1.0;

            if (data.band) document.getElementById('bandValue').textContent = 'Band: ' + data.band;
            if (data.mode !== undefined) {
                const modes = { 0: '--', 1: 'AUTO', 2: 'MANUAL', 3: 'BYPASS' };
                document.getElementById('modeValue').textContent = modes[data.mode] || '--';
            }
            if (data.antenna !== undefined) {
                const ants = { 0: '--', 1: 'A', 2: 'B' };
                document.getElementById('antValue').textContent = ants[data.antenna] || '--';
            }

            drawMeter();
        }

        // ============================================================
        // SSE connection
        // ============================================================
        let eventSource = null;

        function connectSSE() {
            const statusEl = document.getElementById('connectionStatus');
            eventSource = new EventSource('/api/events');

            eventSource.onopen = () => {
                statusEl.innerHTML = '<span class="status-dot"></span> Connected';
            };

            eventSource.onerror = () => {
                statusEl.innerHTML = '<span class="status-dot offline"></span> Disconnected';
                eventSource.close();
                setTimeout(connectSSE, 5000);
            };

            eventSource.addEventListener('meter', (e) => {
                updateMeter(JSON.parse(e.data));
            });

            eventSource.addEventListener('status', (e) => {
                showToast('Status: ' + e.data);
            });
        }

        // ============================================================
        // Commands
        // ============================================================
        async function sendCommand(cmd) {
            try {
                const resp = await fetch('/api/command/' + cmd, { method: 'POST' });
                const data = await resp.json();
                if (data.result === 'success') {
                    showToast(cmd.replace('_', ' ') + ' sent');
                } else {
                    showToast('Command failed', 'error');
                }
            } catch (err) {
                showToast('Connection error', 'error');
            }
        }

        // ============================================================
        // Settings
        // ============================================================
        async function loadSettings() {
            try {
                const resp = await fetch('/api/config');
                const data = await resp.json();
                if (data.mqttBroker) document.getElementById('mqttBroker').value = data.mqttBroker;
                if (data.mqttPort) document.getElementById('mqttPort').value = data.mqttPort;
                if (data.mqttUsername) document.getElementById('mqttUser').value = data.mqttUsername;
                if (data.webUsername) document.getElementById('webUser').value = data.webUsername;
                if (data.meterPsuVoltage) document.getElementById('psuVoltage').value = data.meterPsuVoltage;
                if (data.wifiSSID) document.getElementById('ssid').value = data.wifiSSID;
            } catch (err) {}
        }

        async function saveSettings() {
            const config = {
                mqttBroker: document.getElementById('mqttBroker').value,
                mqttPort: parseInt(document.getElementById('mqttPort').value),
                mqttUsername: document.getElementById('mqttUser').value,
                mqttPassword: document.getElementById('mqttPass').value,
                webUsername: document.getElementById('webUser').value,
                webPassword: document.getElementById('webPass').value,
                meterPsuVoltage: parseFloat(document.getElementById('psuVoltage').value),
                ssid: document.getElementById('ssid').value,
                wifiPassword: document.getElementById('wifiPass').value
            };

            try {
                const resp = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const data = await resp.json();
                if (data.result === 'ok') {
                    showToast('Settings saved. Restarting...');
                } else {
                    showToast('Save failed', 'error');
                }
            } catch (err) {
                showToast('Connection error', 'error');
            }
        }

        async function resetSettings() {
            if (!confirm('Reset all settings to defaults? This will restart the device.')) return;
            try {
                await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reset: true })
                });
                showToast('Settings reset. Restarting...');
            } catch (err) {
                showToast('Reset failed', 'error');
            }
        }

        // Initialize
        drawMeter();
        connectSSE();
        loadSettings();
    </script>
</body>
</html>
