; PlatformIO Project Configuration File
;
;   Build options: build flags, library dependencies, upload settings
;   Advanced options: extra scripting
;
; See: https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-display
description = Remote LDG Tuner Controller (AT-1000ProII and compatible)
src_dir = src
include_dir = include
data_dir = data

[common]
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8
    https://github.com/jackjansen/esp32_idf5_https_server.git
    lvgl/lvgl@^8.3.0
    bodmer/TFT_eSPI@^2.5.0
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

lib_ignore =
    WebServer

build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; esp32_idf5_https_server defaults to 512-byte request chunks, which is
    ; smaller than a modern Chrome WebSocket upgrade request (~530 bytes with
    ; User-Agent + Sec-WebSocket-Extensions). The library's header parser
    ; gets stuck on the boundary, never reaches STATE_HEADERS_FINISHED, and
    ; the WS upgrade hangs. Bump to 2 KB so any reasonable request fits.
    -DHTTPS_CONNECTION_DATA_CHUNK_SIZE=2048
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_BUILD_EXAMPLES=0
    -DLV_USE_DEMO_WIDGETS=0
    -DLV_USE_DEMO_BENCHMARK=0
    -DLV_USE_DEMO_STRESS=0
    -DLV_USE_DEMO_MUSIC=0
    -I include
    -DUSER_SETUP_LOADED
    -DILI9488_DRIVER
    -DTFT_MOSI=23
    -DTFT_MISO=19
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=15
    -DTFT_RST=-1
    -DSPI_FREQUENCY=20000000
    -DSPI_READ_FREQUENCY=16000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DSMOOTH_FONT
    -DSUPPORT_TRANSACTIONS

[env]
platform = espressif32
framework = arduino
board = esp32dev
monitor_speed = ${common.monitor_speed}
lib_deps = ${common.lib_deps}
build_flags = ${common.build_flags}
board_build.partitions = partitions_custom.csv
board_build.filesystem = littlefs
upload_speed = 921600
; Apply local patches under patches/ to managed library deps before each build.
; Currently fixes the NULL-_ssl polling crash in esp32_idf5_https_server that
; takes down the runtime web server (see patches/ and tests/wedge_repro.sh).
extra_scripts = pre:scripts/apply_patches.py

[env:esp32-display]
extends = env
build_flags =
    ${common.build_flags}
    -DWITH_DISPLAY
    -DWITH_TOUCH

[env:esp32-remote]
extends = env
build_flags =
    ${common.build_flags}
