name: Build Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build all environments
        run: |
          pio run -e esp32-display
          pio run -e esp32-remote
          pio run -e esp32-nodisplay

      - name: Copy firmware binaries
        run: |
          # esp-web-tools needs the bootloader + partition table + boot_app0
          # + application image at their proper offsets. PlatformIO produces
          # only the application as firmware.bin; the others live alongside
          # in .pio/build and in the framework's tools/partitions/ directory.
          mkdir -p firmware
          for variant in display remote nodisplay; do
            cp .pio/build/esp32-${variant}/bootloader.bin firmware/ldg-tuner-${variant}-bootloader.bin
            cp .pio/build/esp32-${variant}/partitions.bin firmware/ldg-tuner-${variant}-partitions.bin
            cp .pio/build/esp32-${variant}/firmware.bin   firmware/ldg-tuner-${variant}.bin
          done
          # boot_app0.bin is identical across builds; ship one copy.
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin firmware/boot_app0.bin

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware/*.bin

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: firmware/*.bin
          generate_release_notes: true

  deploy-pages:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build flasher page
        run: |
          mkdir -p dist
          cp flash.html dist/index.html
          cp firmware/*.bin dist/
          # ESP32 image parts and their flash offsets (per partitions_custom.csv):
          #   0x1000  bootloader.bin   (second-stage bootloader)
          #   0x8000  partitions.bin   (partition table)
          #   0xe000  boot_app0.bin    (OTA selector seed)
          #   0x10000 firmware.bin     (application)
          # Previously the manifest listed only firmware.bin at offset 0,
          # which clobbered the bootloader and left the chip unbootable
          # after a long erase.
          for variant in display remote nodisplay; do
            case $variant in
              display)   pretty="LDG Tuner Controller (Display)" ;;
              remote)    pretty="LDG Tuner Controller (Remote)" ;;
              nodisplay) pretty="LDG Tuner Controller (No Display)" ;;
            esac
            cat > dist/manifest-${variant}.json << EOF
          {
            "name": "${pretty}",
            "version": "${{ github.sha }}",
            "builds": [
              {
                "chipFamily": "ESP32",
                "parts": [
                  { "path": "ldg-tuner-${variant}-bootloader.bin", "offset": 4096 },
                  { "path": "ldg-tuner-${variant}-partitions.bin", "offset": 32768 },
                  { "path": "boot_app0.bin",                       "offset": 57344 },
                  { "path": "ldg-tuner-${variant}.bin",            "offset": 65536 }
                ]
              }
            ]
          }
          EOF
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
