name: Build Firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build all environments
        run: |
          pio run -e esp32-display
          pio run -e esp32-remote
          pio run -e esp32-nodisplay

      - name: Copy firmware binaries
        run: |
          mkdir -p firmware
          cp .pio/build/esp32-display/firmware.bin firmware/ldg-tuner-display.bin
          cp .pio/build/esp32-remote/firmware.bin firmware/ldg-tuner-remote.bin
          cp .pio/build/esp32-nodisplay/firmware.bin firmware/ldg-tuner-nodisplay.bin

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware/*.bin

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: firmware/*.bin
          generate_release_notes: true

  deploy-pages:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build flasher page
        run: |
          mkdir -p dist
          cp flash.html dist/index.html
          cp firmware/*.bin dist/
          # Create manifest for esp-web-tools
          cat > dist/manifest-display.json << 'EOF'
          {
            "name": "LDG Tuner Controller (Display)",
            "version": "${{ github.sha }}",
            "builds": [
              {
                "chipFamily": "ESP32",
                "parts": [
                  { "path": "ldg-tuner-display.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF
          cat > dist/manifest-remote.json << 'EOF'
          {
            "name": "LDG Tuner Controller (Remote)",
            "version": "${{ github.sha }}",
            "builds": [
              {
                "chipFamily": "ESP32",
                "parts": [
                  { "path": "ldg-tuner-remote.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF
          cat > dist/manifest-nodisplay.json << 'EOF'
          {
            "name": "LDG Tuner Controller (No Display)",
            "version": "${{ github.sha }}",
            "builds": [
              {
                "chipFamily": "ESP32",
                "parts": [
                  { "path": "ldg-tuner-nodisplay.bin", "offset": 0 }
                ]
              }
            ]
          }
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
